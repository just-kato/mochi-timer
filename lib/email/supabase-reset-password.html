<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@700&display=swap');
  </style>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:48px 16px;">

        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;">

          <!-- header -->
          <tr>
            <td bgcolor="#000000" style="background-color:#000000;padding:20px 32px;border:3px solid #000000;border-bottom:0;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <span style="font-family:'Space Mono',monospace,Courier;font-weight:700;font-size:18px;color:#FFFF00;letter-spacing:0.04em;">MOCHI TIMER</span>
                  </td>
                  <td align="right">
                    <span style="font-family:'Space Mono',monospace,Courier;font-size:24px;color:#ffffff;">⏱</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- red-orange stripe -->
          <tr>
            <td bgcolor="#FF3B00" style="background-color:#FF3B00;border-left:3px solid #000000;border-right:3px solid #000000;padding:0;line-height:8px;font-size:8px;">&nbsp;</td>
          </tr>

          <!-- body -->
          <tr>
            <td style="background-color:#ffffff;border:3px solid #000000;border-top:0;padding:40px 32px 36px;box-shadow:6px 6px 0px #000000;">

              <p style="margin:0 0 6px 0;font-family:'Space Grotesk',Arial,sans-serif;font-weight:700;font-size:11px;color:#000000;letter-spacing:0.18em;text-transform:uppercase;">
                PASSWORD RESET
              </p>

              <h1 style="margin:0 0 20px 0;font-family:'Space Grotesk',Arial,sans-serif;font-weight:700;font-size:36px;color:#000000;line-height:1.05;letter-spacing:-0.02em;text-transform:uppercase;">
                NEW<br>PASSWORD.
              </h1>

              <p style="margin:0 0 32px 0;font-family:'Space Grotesk',Arial,sans-serif;font-size:15px;color:#000000;line-height:1.65;">
                We got a request to reset your <strong>Mochi Timer</strong> password. Click the button below to choose a new one.
              </p>

              <!-- CTA - white button with red-orange hover feel via border -->
              <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:32px;">
                <tr>
                  <td style="box-shadow:4px 4px 0px #000000;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background-color:#FF3B00;color:#000000;font-family:'Space Grotesk',Arial,sans-serif;font-weight:700;font-size:13px;letter-spacing:0.16em;text-transform:uppercase;text-decoration:none;padding:16px 32px;border:3px solid #000000;">
                      RESET PASSWORD &rarr;
                    </a>
                  </td>
                </tr>
              </table>

              <!-- link fallback -->
              <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:24px;width:100%;border:3px solid #000000;background-color:#000000;">
                <tr>
                  <td style="padding:10px 14px;">
                    <p style="margin:0 0 4px 0;font-family:'Space Grotesk',Arial,sans-serif;font-size:10px;font-weight:700;color:#999999;letter-spacing:0.15em;text-transform:uppercase;">
                      OR PASTE THIS LINK
                    </p>
                    <p style="margin:0;font-family:'Space Mono',monospace,Courier;font-size:10px;color:#FFFF00;word-break:break-all;">
                      {{ .ConfirmationURL }}
                    </p>
                  </td>
                </tr>
              </table>

              <!-- security note -->
              <table cellpadding="0" cellspacing="0" border="0" style="width:100%;margin-bottom:0;border:3px solid #000000;background-color:#FFFF00;">
                <tr>
                  <td style="padding:12px 16px;">
                    <p style="margin:0;font-family:'Space Grotesk',Arial,sans-serif;font-size:11px;font-weight:700;color:#000000;text-transform:uppercase;letter-spacing:0.12em;line-height:1.6;">
                      ⚠ DIDN'T REQUEST THIS? YOUR ACCOUNT IS SAFE — JUST IGNORE THIS EMAIL.
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
